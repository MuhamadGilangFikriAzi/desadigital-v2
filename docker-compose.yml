services:
  # ─── Web Server ───
  app:
    image: laravelapp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desadigital-v2-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www/html
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - desadigital-network
    depends_on:
      - db
      - redis

  # ─── Database ───
  db:
    image: mysql:8.3
    container_name: desadigital-v2-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: desadigital_v2
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_USER: desadigital
      MYSQL_PASSWORD: secret123
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - desadigital-network

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: desadigital-v2-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - desadigital-network

  # ─── Node.js (Vite dev server) ───
  node:
    image: node:22-alpine
    container_name: desadigital-v2-node
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - desadigital-network
    depends_on:
      - app

  # ─── phpMyAdmin (opsional) ───
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: desadigital-v2-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    networks:
      - desadigital-network
    depends_on:
      - db

networks:
  desadigital-network:
    driver: bridge

volumes:
  dbdata:
